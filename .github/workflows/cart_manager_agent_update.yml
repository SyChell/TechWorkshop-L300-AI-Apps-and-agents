name: Deploy Cart Manager Agent

on:
  push:
    paths:
      - 'src/prompts/CartManagerPrompt.txt'
      - 'src/infra/agents/cart-manager.json'
  workflow_dispatch:

jobs:
  deploy-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy cart-manager agent to Foundry
        env:
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          GPT_DEPLOYMENT: ${{ secrets.GPT_DEPLOYMENT }}
        run: |
          INSTRUCTIONS=$(python3 -c "import json; print(json.dumps(open('src/prompts/CartManagerPrompt.txt', 'r').read()))")

          jq --arg model "$GPT_DEPLOYMENT" \
             --argjson instructions "$INSTRUCTIONS" \
             '.definition.model = (.definition.model | gsub("\\$\\{GPT_DEPLOYMENT\\}"; $model))
              | .definition.instructions = (if .definition.instructions == "${INSTRUCTIONS}" then $instructions else .definition.instructions end)' \
             src/infra/agents/cart-manager.json > /tmp/agent-payload.json

          RESPONSE=$(az rest --method POST \
            --url "${FOUNDRY_ENDPOINT}/agents/cart-manager/versions?api-version=2025-11-15-preview" \
            --headers "Content-Type=application/json" \
            --resource "https://ai.azure.com" \
            --body @/tmp/agent-payload.json)

          echo "$RESPONSE" | jq '{id: .id, name: .name, version: .version, agent_name: (.agent_name // .agentName // .name)}'

          echo "cart-manager agent deployed successfully."
